{# Create-profile dialog. Same modal contract as the Nova Busca
   partial — modal.js auto-opens once swapped into #modal-target. #}
<dialog id="new-profile-dialog"
        class="bg-transparent p-0 max-w-full max-h-full backdrop:bg-[rgba(10,6,18,0.7)]"
        aria-label="Criar quality profile">
    <div class="w-[520px] max-w-full card-hairline bg-bg-surface border border-border-default rounded-2xl"
         style="box-shadow: 0 24px 60px var(--color-glow);">

        <header class="flex items-center justify-between gap-3 px-6 py-5">
            <div class="flex items-center gap-3">
                <div class="shrink-0 w-10 h-10 rounded-[10px] bg-accent-soft flex items-center justify-center text-accent-soft-fg">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                </div>
                <div>
                    <h2 class="text-[22px] font-semibold leading-tight text-fg-primary">Novo profile</h2>
                    <p class="text-xs text-fg-secondary">Threshold + nome + descrição (rule builder vem depois)</p>
                </div>
            </div>
            <form method="dialog" class="contents">
                <button type="submit" aria-label="Fechar"
                        class="p-2 rounded-md bg-bg-muted text-fg-secondary hover:bg-bg-surface-raised hover:text-fg-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
                </button>
            </form>
        </header>

        <div class="h-px bg-border-default"></div>

        <form hx-post="/profiles"
              hx-target="body"
              hx-swap="outerHTML"
              class="px-6 py-5 flex flex-col gap-4">

            <label class="block">
                <span class="block mb-1.5 text-xs font-medium uppercase tracking-[0.06em] text-fg-muted">Nome</span>
                <input name="name" required autofocus placeholder="ex.: Anime JP com legenda PT" maxlength="120"
                       class="w-full px-3 h-11 rounded-lg bg-bg-canvas border border-border-strong text-base text-fg-primary placeholder:text-fg-muted focus:outline-none focus:border-accent-solid">
            </label>

            <label class="block">
                <span class="block mb-1.5 text-xs font-medium uppercase tracking-[0.06em] text-fg-muted">Descrição (opcional)</span>
                <input name="description" placeholder="O que este profile aceita / rejeita" maxlength="240"
                       class="w-full px-3 h-11 rounded-lg bg-bg-canvas border border-border-strong text-base text-fg-primary placeholder:text-fg-muted focus:outline-none focus:border-accent-solid">
            </label>

            <label class="block">
                <span class="block mb-1.5 text-xs font-medium uppercase tracking-[0.06em] text-fg-muted">Push threshold (0–1000)</span>
                <input name="push_threshold" type="number" min="0" max="500" value="150" required
                       class="w-full px-3 h-11 rounded-lg bg-bg-canvas border border-border-strong text-base font-mono font-semibold text-fg-primary focus:outline-none focus:border-accent-solid">
                <span class="block mt-1.5 text-xs text-fg-muted">
                    Releases com score ≥ esse valor disparam push automático no *arr atribuído.
                    Baseline scoring topa em ~230. Veja
                    <a href="/providers" class="text-accent-soft-fg font-semibold">Providers</a>
                    pra tabela completa.
                </span>
            </label>

            <div class="h-px bg-border-default -mx-6"></div>

            <div class="flex items-center justify-end gap-2 pt-1">
                <form method="dialog" class="contents">
                    <button type="submit"
                            class="px-4 h-10 rounded-lg bg-bg-canvas border border-border-strong text-fg-primary text-sm font-medium">
                        Cancelar
                    </button>
                </form>
                <button type="submit"
                        class="brand-gradient flex items-center gap-2 px-5 h-10 rounded-lg text-white text-sm font-semibold"
                        style="box-shadow: 0 6px 16px var(--color-glow);">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg>
                    Criar profile
                </button>
            </div>
        </form>
    </div>
</dialog>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{% block title %}brarr{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
        .badge { padding: 0.125rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <nav class="bg-slate-900 text-slate-100">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-6">
            <a href="/" class="font-bold text-lg">brarr</a>
            <a href="/" class="hover:text-amber-300">Dashboard</a>
            <a href="/providers" class="hover:text-amber-300">Providers</a>
            <a href="/releases" class="hover:text-amber-300">Releases</a>
            <span class="ml-auto text-xs text-slate-400">orchestrator</span>
        </div>
    </nav>
    <main class="max-w-6xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>

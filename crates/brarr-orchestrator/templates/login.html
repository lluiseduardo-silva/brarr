{% extends "base.html" %}
{% block title %}Entrar — brarr{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto bg-white rounded-lg shadow p-6 mt-12">
    <h1 class="text-xl font-bold mb-4">Acesso administrativo</h1>
    {% if let Some(msg) = error_message %}
    <p class="mb-3 text-sm text-red-700 bg-red-50 border border-red-200 rounded px-3 py-2">{{ msg }}</p>
    {% endif %}
    <form method="post" action="/login" class="space-y-3">
        <label class="block text-xs uppercase tracking-wide text-slate-500">
            Token
            <input name="token" required type="password" autocomplete="current-password"
                   class="w-full mt-1 border rounded px-2 py-1 text-sm">
        </label>
        <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-white text-sm font-semibold px-3 py-2 rounded">
            Entrar
        </button>
    </form>
    <p class="mt-4 text-xs text-slate-500">
        Configure <code>BRARR_AUTH_TOKEN</code> no ambiente do servidor para gerar este segredo.
    </p>
</div>
{% endblock %}

syntax = "proto3";

package brarr.v1;

// Service exposed by `brarr-orchestrator` over gRPC.
//
// Mirrors the search flow already exposed by `brarr-cli`: caller supplies an
// external media ID (TMDb for now), server fans out to every configured
// provider (UNIT3D tracker, Newznab/Torznab indexer, or WASM plugin),
// persists the run, applies the decision engine, and returns the ranked
// release list.
service Brarr {
  // Search every configured provider for releases matching the request.
  rpc Search(SearchRequest) returns (SearchReply);

  // List all providers configured in the orchestrator's database.
  rpc ListProviders(ListProvidersRequest) returns (ListProvidersReply);

  // Returns the most recent persisted searches, newest first.
  rpc RecentSearches(RecentSearchesRequest) returns (RecentSearchesReply);
}

message SearchRequest {
  // External media id. Exactly one of `tmdb_id`, `imdb_id` must be set.
  // For now only `tmdb_id` is honored; `imdb_id` is reserved for future use.
  uint32 tmdb_id = 1;
  string imdb_id = 2;
}

message SearchReply {
  string search_id = 1; // UUID v4 of the persisted search row.
  repeated ReleaseOutcome outcomes = 2;
}

message ReleaseOutcome {
  string provider_name = 1;
  string release_name = 2;
  uint64 release_id_remote = 3;
  uint32 score = 4;
  bool rejected = 5;
  repeated string tags = 6;
  repeated string matched_rules = 7;
  uint32 seeders = 8;
  uint32 leechers = 9;
  uint64 size_bytes = 10;
  string resolution = 11; // e.g. "1080p", "2160p", "unknown"
  string kind = 12;       // e.g. "WEB-DL", "BluRay-REMUX", "unknown"
}

message ListProvidersRequest {}
message ListProvidersReply {
  repeated ProviderSummary providers = 1;
}

message ProviderSummary {
  string id = 1; // UUID
  string name = 2;
  string base_url = 3;
  string kind = 4; // "unit3d" | "newznab" | "torznab" | "plugin"
  int64 created_at_unix = 5;
}

message RecentSearchesRequest {
  uint32 limit = 1; // 0 → server default (20). Capped server-side at 200.

  // Optional filters. When any field is set, the server runs a
  // filtered query instead of the simple recent-N path. All filters
  // are AND-combined. Empty / unset fields don't constrain.
  optional uint32 tmdb_id = 2;
  optional string imdb_id = 3;
  optional uint32 tvdb_id = 4;
  optional uint32 season = 5;
  optional uint32 episode = 6;
  optional int64 from_unix = 7;
  optional int64 to_unix = 8;
  // Tri-state: omit = any, true = only searches with at least one
  // non-rejected decision, false = only searches with zero kept
  // decisions.
  optional bool has_kept_decision = 9;
  // Row offset for pagination. Combined with `limit` to fetch
  // subsequent pages.
  uint32 offset = 10;
}
message RecentSearchesReply {
  repeated SearchSummary searches = 1;
}

message SearchSummary {
  string id = 1; // UUID
  uint32 tmdb_id = 2;
  int64 submitted_at_unix = 3;
  uint32 result_count = 4;

  // Non-TMDb axis fields. Empty string for IMDb means unset; zero
  // for tvdb/season/episode means unset.
  string imdb_id = 5;
  uint32 tvdb_id = 6;
  uint32 season = 7;
  uint32 episode = 8;
}
